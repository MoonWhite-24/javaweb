server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://192.168.200.100:3306/javaweb_market?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: market
    password: Market@2026!
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: 192.168.200.100
      port: 6379
      password: Redis@2026!
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  kafka:
    bootstrap-servers: 192.168.200.100:9092
    producer:
      acks: 1
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        linger.ms: 5
    consumer:
      group-id: market-consumer-group
      enable-auto-commit: true
      auto-commit-interval: 3000
      max-poll-records: 100
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

mybatis:
  config-location: classpath:mybatis-config.xml
  mapper-locations: classpath:mapper/*.xml

app:
  jwt:
    secret: market-jwt-secret-key-2026-must-be-at-least-256-bits-long!!
    access-expiration: 900000
    refresh-expiration: 604800000

snowflake:
  worker-id: ${SNOWFLAKE_WORKER_ID:1}

logging:
  level:
    com.market: DEBUG
